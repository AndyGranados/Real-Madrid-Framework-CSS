<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formularios — Madrid CSS</title>
  <link rel="stylesheet" href="scss/main.css">
  <link rel="stylesheet" href="scss/docs.css">
</head>
<body data-page="forms">

<div class="docs-layout">

  <main class="docs-main">

    <header class="docs-page-header" data-icon="📝">
      <div class="docs-page-header__badge">Componente</div>
      <h1>Formularios</h1>
      <p>Campos estilizados con estructura BEM.</p>
    </header>

    <div class="docs-content">

      <section class="docs-section">
        <div class="docs-section__title">Estructura básica</div>

        <div class="docs-demo">

          <div class="docs-demo__preview--block docs-demo__preview--form">

            <div class="form__group">
              <label class="form__label">Nombre</label>
              <input type="text" class="form__control" placeholder="Escribe tu nombre">
            </div>

            <div class="form__group">
              <label class="form__label">Correo</label>
              <input type="email" class="form__control" placeholder="correo@email.com">
            </div>

            <div class="form__group">
              <label class="form__label">Mensaje</label>
              <textarea class="form__control" rows="3"></textarea>
            </div>

          </div>

        </div>
      </section>

    </div>

  </main>

</div>

</body>
</html>
